name: EAS Build (reader-mobile)

on:
  push:
    tags:
      - 'mobile-v*'
  workflow_dispatch:
    inputs:
      profile:
        description: 'Build profile (preview = APK, production = AAB)'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: reader-mobile/package-lock.json

      - name: Install dependencies
        working-directory: reader-mobile
        run: npm ci --legacy-peer-deps

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Determine build profile
        id: profile
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.profile }}" >> $GITHUB_OUTPUT
          else
            echo "value=preview" >> $GITHUB_OUTPUT
          fi

      - name: Build Android (${{ steps.profile.outputs.value }})
        working-directory: reader-mobile
        run: eas build --platform android --profile ${{ steps.profile.outputs.value }} --non-interactive
